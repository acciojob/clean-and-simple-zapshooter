<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Styled Table</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #e6e6e6;
      padding: 20px;
    }

    table {
      border-collapse: separate;
      border-spacing: 10px; /* creates gap between cells like in image */
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      border-radius: 5px;
      text-align: left;
    }

    th {
      font-weight: bold;
      background-color: #f2f2f2;
    }

    /* Odd rows */
    tr:nth-child(odd) td {
      background-color: #f2f2f2;
    }

    /* Even rows */
    tr:nth-child(even) td {
      background-color: #ffffff;
    }
  </style>
</head>
<body>

  <table>
    <tr>
      <th>Table-Header 1</th>
      <th>Table-Header 2</th>
    </tr>
    <tr>
      <td>Cell 1</td>
      <td>Cell 2</td>
    </tr>
    <tr>
      <td>Cell 4</td>
      <td>Cell 5</td>
    </tr>
    <tr>
      <td>Cell 7</td>
      <td>Cell 8</td>
    </tr>
    <tr>
      <td>Cell 9</td>
      <td>Cell 10</td>
    </tr>
  </table>

</body>
</html>
